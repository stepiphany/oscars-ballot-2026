<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="40%" style="stop-color:#B0D4E8"/>
      <stop offset="60%" style="stop-color:#8B9DC3"/>
      <stop offset="100%" style="stop-color:#5C6B7A"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3d3d3d"/>
      <stop offset="100%" style="stop-color:#5C6B7A"/>
    </linearGradient>
    <filter id="cloud">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <ellipse cx="960" cy="200" rx="400" ry="80" fill="rgba(255,255,255,0.4)"/>
  <ellipse cx="400" cy="250" rx="250" ry="50" fill="rgba(255,255,255,0.3)"/>
  <ellipse cx="1500" cy="180" rx="300" ry="60" fill="rgba(255,255,255,0.35)"/>
  <path d="M0 600 Q 300 500 600 580 T 1200 550 T 1920 600 L 1920 1080 L 0 1080 Z" fill="url(#ground)"/>
  <path d="M0 650 Q 400 520 800 620 T 1600 580 L 1920 650 L 1920 1080 L 0 1080 Z" fill="#4a4a4a" opacity="0.8"/>
  <path d="M200 1080 L 200 700 Q 350 650 500 700 L 500 1080 Z" fill="#3d3d3d"/>
  <path d="M1400 1080 L 1400 720 Q 1550 680 1700 740 L 1700 1080 Z" fill="#353535"/>
</svg>
